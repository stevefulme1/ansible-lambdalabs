---
# Integration tests for stevefulme1.lambdalabs.job_scheduler

- name: List scheduled jobs
  stevefulme1.lambdalabs.job_scheduler_info:
    api_key: "{{ lambdalabs_api_key }}"
  register: list_result

- name: Verify listing returns a list
  ansible.builtin.assert:
    that:
      - list_result.jobs is defined

- name: Schedule a job (check_mode)
  stevefulme1.lambdalabs.job_scheduler:
    api_key: "{{ lambdalabs_api_key }}"
    name: "ansible-test-{{ resource_prefix }}"
    instance_type: "{{ test_instance_type | default('gpu_1x_a100') }}"
    region: "{{ test_region | default('us-east-1') }}"
    ssh_key_names: "{{ test_ssh_key_names | default(['ansible-test-key']) }}"
    quantity: 1
    state: present
  check_mode: true
  register: check_result

- name: Verify check_mode reports changed
  ansible.builtin.assert:
    that:
      - check_result is changed

- name: Schedule a job
  stevefulme1.lambdalabs.job_scheduler:
    api_key: "{{ lambdalabs_api_key }}"
    name: "ansible-test-{{ resource_prefix }}"
    instance_type: "{{ test_instance_type | default('gpu_1x_a100') }}"
    region: "{{ test_region | default('us-east-1') }}"
    ssh_key_names: "{{ test_ssh_key_names | default(['ansible-test-key']) }}"
    quantity: 1
    state: present
  register: create_result

- name: Verify job was scheduled
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.job is defined

- name: Cancel scheduled job (check_mode)
  stevefulme1.lambdalabs.job_scheduler:
    api_key: "{{ lambdalabs_api_key }}"
    name: "ansible-test-{{ resource_prefix }}"
    job_id: "{{ create_result.job.id | default('placeholder') }}"
    state: absent
  check_mode: true
  register: delete_check

- name: Verify check_mode delete reports changed
  ansible.builtin.assert:
    that:
      - delete_check is changed

- name: Cancel scheduled job
  stevefulme1.lambdalabs.job_scheduler:
    api_key: "{{ lambdalabs_api_key }}"
    name: "ansible-test-{{ resource_prefix }}"
    job_id: "{{ create_result.job.id | default('placeholder') }}"
    state: absent
  register: delete_result

- name: Verify job was cancelled
  ansible.builtin.assert:
    that:
      - delete_result is changed

- name: Cancel scheduled job again (idempotent)
  stevefulme1.lambdalabs.job_scheduler:
    api_key: "{{ lambdalabs_api_key }}"
    name: "ansible-test-{{ resource_prefix }}"
    job_id: "{{ create_result.job.id | default('placeholder') }}"
    state: absent
  register: delete_idem

- name: Verify idempotent cancel
  ansible.builtin.assert:
    that:
      - delete_idem is not changed
