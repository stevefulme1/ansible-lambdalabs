---
# Integration tests for stevefulme1.lambdalabs.ssh_key
# These tests require valid credentials configured in integration_config.yml

- name: Create ssh_key (check_mode)
  stevefulme1.lambdalabs.ssh_key:
    api_key: "{{ lambdalabs_api_key }}"
    state: present
    public_key: "{{ test_public_key | default('ssh-ed25519 AAAA test@ansible') }}"
    name: "ansible-test-{{ resource_prefix }}"
  check_mode: true
  register: check_result

- name: Verify check_mode reports changed
  ansible.builtin.assert:
    that:
      - check_result is changed

- name: Create ssh_key
  stevefulme1.lambdalabs.ssh_key:
    api_key: "{{ lambdalabs_api_key }}"
    state: present
    public_key: "{{ test_public_key | default('ssh-ed25519 AAAA test@ansible') }}"
    name: "ansible-test-{{ resource_prefix }}"
  register: create_result

- name: Verify ssh_key was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.ssh_key is defined

- name: Create ssh_key again (idempotency)
  stevefulme1.lambdalabs.ssh_key:
    api_key: "{{ lambdalabs_api_key }}"
    state: present
    public_key: "{{ test_public_key | default('ssh-ed25519 AAAA test@ansible') }}"
    name: "ansible-test-{{ resource_prefix }}"
  register: idem_result

- name: Verify idempotent create
  ansible.builtin.assert:
    that:
      - idem_result is not changed

- name: Delete ssh_key (check_mode)
  stevefulme1.lambdalabs.ssh_key:
    api_key: "{{ lambdalabs_api_key }}"
    state: absent
    name: "ansible-test-{{ resource_prefix }}"
  check_mode: true
  register: delete_check

- name: Verify check_mode delete reports changed
  ansible.builtin.assert:
    that:
      - delete_check is changed

- name: Delete ssh_key
  stevefulme1.lambdalabs.ssh_key:
    api_key: "{{ lambdalabs_api_key }}"
    state: absent
    name: "ansible-test-{{ resource_prefix }}"
  register: delete_result

- name: Verify ssh_key was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed

- name: Delete ssh_key again (idempotent)
  stevefulme1.lambdalabs.ssh_key:
    api_key: "{{ lambdalabs_api_key }}"
    state: absent
    name: "ansible-test-{{ resource_prefix }}"
  register: delete_idem

- name: Verify idempotent delete
  ansible.builtin.assert:
    that:
      - delete_idem is not changed
