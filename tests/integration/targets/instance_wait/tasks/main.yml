---
# Integration tests for stevefulme1.lambdalabs.instance_wait

- name: List running instances
  stevefulme1.lambdalabs.instance_info:
    api_key: "{{ lambdalabs_api_key }}"
  register: instances

- name: Verify instance listing
  ansible.builtin.assert:
    that:
      - instances.instances is defined

- name: Check instance wait info
  stevefulme1.lambdalabs.instance_wait_info:
    api_key: "{{ lambdalabs_api_key }}"
  register: wait_info

- name: Verify wait info
  ansible.builtin.assert:
    that:
      - wait_info is not failed

- name: Wait for instance (check_mode)
  stevefulme1.lambdalabs.instance_wait:
    api_key: "{{ lambdalabs_api_key }}"
    instance_id: "{{ test_instance_id | default('test-instance-id') }}"
    target_state: active
    max_wait: 60
  check_mode: true
  register: check_result

- name: Verify check_mode reports changed
  ansible.builtin.assert:
    that:
      - check_result is changed

- name: Wait for instance to be active
  stevefulme1.lambdalabs.instance_wait:
    api_key: "{{ lambdalabs_api_key }}"
    instance_id: "{{ test_instance_id }}"
    target_state: active
    max_wait: 300
    poll_interval: 10
  register: wait_result
  when: test_instance_id is defined

- name: Verify wait completed
  ansible.builtin.assert:
    that:
      - wait_result.instance is defined
      - wait_result.elapsed is defined
  when: test_instance_id is defined
